<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kalkulator HP</title>

<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
  }

  .calculator {
    width: 300px;
    background: black;
    border-radius: 30px;
    padding: 20px;
  }

  #display {
    width: 100%;
    height: 80px;
    font-size: 32px;
    text-align: right;
    background: black;
    color: white;
    border: none;
    margin-bottom: 20px;
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  button {
    height: 60px;
    font-size: 20px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }

  .num {
    background: #333;
    color: white;
  }

  .op {
    background: orange;
    color: white;
  }

  .top {
    background: #aaa;
  }

  .zero {
    grid-column: span 2;
    border-radius: 30px;
  }
</style>
</head>

<body>

<div class="calculator">
  <input type="text" id="display" disabled>

  <div class="buttons">
    <button class="top">C</button>
    <button class="top">^</button>
    <button class="top">√</button>
    <button class="op">÷</button>

    <button class="num">7</button>
    <button class="num">8</button>
    <button class="num">9</button>
    <button class="op">×</button>

    <button class="num">4</button>
    <button class="num">5</button>
    <button class="num">6</button>
    <button class="op">-</button>

    <button class="num">1</button>
    <button class="num">2</button>
    <button class="num">3</button>
    <button class="op">+</button>

    <button class="num zero">0</button>
    <button class="num">.</button>
    <button class="op">=</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
